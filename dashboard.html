<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Hook · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* ── Palette ─────────────────────────────────────────────────────────── */
    :root {
      --bg:     #1c1a18;
      --panel:  #201e1b;
      --border: #332e24;
      --text:   #e8d5a0;
      --muted:  #7a6e50;
      --green:  #4cd964;
      --yellow: #ffd60a;
      --red:    #ff453a;
      --blue:   #4da6ff;
      --amber:  #ffb300;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      -webkit-font-smoothing: auto;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px;
      border-top: 1px solid var(--amber);
      border-bottom: 2px solid var(--amber);
      gap: 20px;
    }

    .hd-left { flex: 1; }

    .hd-title {
      font-size: 16px;
      letter-spacing: 0.18em;
    }

    .hd-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.1em;
    }

    .clock {
      font-size: 56px;
      letter-spacing: 0.05em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .hd-right {
      flex: 1;
      text-align: right;
      font-size: 11px;
      color: var(--muted);
    }

    .live-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Weather strip ───────────────────────────────────────────────────── */
    .weather-strip {
      display: flex;
      align-items: center;
      padding: 10px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      gap: 24px;
      flex-shrink: 0;
    }

    .wx-temp-big {
      font-size: 52px;
      letter-spacing: 0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .wx-detail {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
      flex-shrink: 0;
    }

    .wx-divider {
      width: 1px;
      height: 36px;
      background: var(--border);
      flex-shrink: 0;
    }

    .wx-rain-block {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-shrink: 0;
    }

    .wx-rain-pct {
      font-size: 38px;
      color: var(--blue);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .wx-rain-label {
      font-size: 11px;
      color: var(--muted);
    }

    .wx-sentence {
      flex: 1;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      line-height: 1.6;
      padding-left: 20px;
      border-left: 1px solid var(--border);
    }

    /* ── Three-column grid ───────────────────────────────────────────────── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      overflow: hidden;
      min-height: 0;
    }

    .panel {
      background: var(--panel);
      padding: 22px 30px 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--amber);
      margin-bottom: 3px;
      flex-shrink: 0;
    }

    .panel-sublabel {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    /* ── Bus panel ───────────────────────────────────────────────────────── */
    #f-panel, #ac-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .bus-primary {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding-top: 16px;
    }

    .bus-pill {
      font-size: 15px;
      padding: 5px 16px;
      border-radius: 0;
      border: 1px solid currentColor;
      display: inline-block;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      align-self: flex-start;
    }

    .pill-b61    { background: #0a1928; color: var(--blue);  border-color: var(--blue); }
    .pill-b57    { background: #0d2010; color: var(--green); border-color: var(--green); }
    .pill-ferry  { background: #1a1000; color: var(--amber); border-color: var(--amber); }

    .primary-num {
      font-size: 112px;
      line-height: 0.85;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .primary-unit {
      font-size: 30px;
      color: var(--muted);
      margin-left: 8px;
    }

    .primary-now {
      font-size: 80px;
      line-height: 0.9;
    }

    .upcoming-list {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      flex-shrink: 0;
    }

    .upcoming-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .upcoming-pill {
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 0;
      border: 1px solid currentColor;
      display: inline-block;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .upcoming-mins {
      font-size: 30px;
      font-variant-numeric: tabular-nums;
    }

    .upcoming-unit {
      font-size: 13px;
      color: var(--muted);
    }

    .ferry-dep-label {
      font-size: 20px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    .ferry-time-small {
      font-size: 17px;
      color: var(--muted);
      min-width: 90px;
      flex-shrink: 0;
    }

    .leave-by {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
      flex-shrink: 0;
      letter-spacing: 0.06em;
    }

    .leave-by b { color: var(--text); }
    .leave-by .missed { color: var(--red); }

    /* ── Ferry panel ─────────────────────────────────────────────────────── */
    #ferry-rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* ── Citibike bar ────────────────────────────────────────────────────── */
    .bike-bar {
      border-top: 1px solid var(--border);
      padding: 18px 28px;
      font-size: 15px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 28px;
      flex-shrink: 0;
      letter-spacing: 0.08em;
    }

    .bike-bar-label { color: var(--amber); }
    .bike-val { color: var(--text); }

    /* ── Ticker ──────────────────────────────────────────────────────────── */
    .ticker-bar {
      border-top: 2px solid var(--amber);
      height: 32px;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .ticker-track {
      display: flex;
      white-space: nowrap;
      will-change: transform;
    }

    .ticker-item {
      font-size: 11px;
      color: var(--muted);
      padding: 0 28px;
      flex-shrink: 0;
      letter-spacing: 0.1em;
    }

    .ticker-item b { color: var(--text); }

    .ticker-sep {
      color: var(--border);
      padding: 0 4px;
    }

    /* ── Colors ──────────────────────────────────────────────────────────── */
    .c-green  { color: var(--green); }
    .c-yellow { color: var(--yellow); }
    .c-red    { color: var(--red); }
    .c-muted  { color: var(--muted); }

    /* ── Utility ─────────────────────────────────────────────────────────── */
    .loading { color: var(--muted); font-size: 13px; }
    .err     { color: var(--red);   font-size: 12px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- ── Header ── -->
  <header>
    <div class="hd-left">
      <div class="hd-title">Red Hook</div>
      <div class="hd-sub">Atlantic Basin · Dwight & Dikeman</div>
    </div>
    <div class="clock" id="clock">--:--</div>
    <div class="hd-right">
      <span class="live-dot" id="live-dot"></span>
      <span id="status-text">Loading…</span>
    </div>
  </header>

  <!-- ── Weather strip ── -->
  <div class="weather-strip">
    <div class="wx-temp-big" id="wx-temp">--°</div>
    <div class="wx-detail" id="wx-detail"></div>
    <div class="wx-divider"></div>
    <div class="wx-rain-block">
      <span class="wx-rain-pct" id="wx-rain-pct">--%</span>
      <span class="wx-rain-label">Rain</span>
    </div>
    <div class="wx-divider"></div>
    <div class="wx-sentence" id="wx-sentence">Loading…</div>
  </div>

  <!-- ── Panels ── -->
  <div class="panels">

    <!-- F Train Bus -->
    <div class="panel">
      <div class="panel-label">Next Bus · F Train</div>
      <div class="panel-sublabel">Otsego & Creamer</div>
      <div id="f-panel"><div class="loading">Loading…</div></div>
    </div>

    <!-- A/C Train Bus -->
    <div class="panel">
      <div class="panel-label">Next Bus · A/C Train</div>
      <div class="panel-sublabel">Van Brunt & Dikeman</div>
      <div id="ac-panel"><div class="loading">Loading…</div></div>
    </div>

    <!-- Ferry -->
    <div class="panel">
      <div class="panel-label">Next Boat · Manhattan</div>
      <div class="panel-sublabel">Atlantic Basin</div>
      <div id="ferry-rows"><div class="loading">Loading…</div></div>
    </div>

  </div>

  <!-- ── Citibike bar ── -->
  <div class="bike-bar">
    <span class="bike-bar-label">Citibike · Dwight & Dikeman</span>
    <span id="bike-inline"><span class="loading">Loading…</span></span>
  </div>

  <!-- ── Ticker ── -->
  <div class="ticker-bar">
    <div class="ticker-track" id="ticker">
      <span class="ticker-item">Loading…</span>
    </div>
  </div>

</div>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────

const MTA_KEY  = '47d976ac-47a9-4009-816a-a39448f4866e';
const HOME_LAT = 40.6760;
const HOME_LON = -74.0115;

// Simulation override — set SIM_TIME to "HH:MM" and SIM_WEEKEND to true/false
// to freeze the dashboard for testing. Set both to null for live mode.
const SIM_TIME    = null;
const SIM_WEEKEND = null;

// NYC Ferry — South Brooklyn Route, from ferry.nyc
const FERRY = {
  weekday: {
    fromRH: [
      '06:40','07:25','08:10','08:55','09:40','10:25','11:10','11:55',
      '12:40','13:25','14:10','14:55','15:40','16:25','17:10','17:55',
      '18:31','19:16','20:01','20:46',
    ],
    rhToWallSt: 16,
    rhTo34th:   32,
  },
  weekend: {
    fromRH: [
      '09:20','10:03','10:47','11:32','12:16','13:00','13:44','14:28',
      '15:12','15:56','16:40','17:24','17:59','18:43','19:27','20:11',
    ],
    rhToWallSt: 15,
    rhTo34th:   31,
  },
};

// Walk times from 23 Dikeman St
const WALK_TO_F_STOP  = 1;   // Otsego & Creamer
const WALK_TO_AC_STOP = 3;   // Van Brunt & Dikeman
const WALK_TO_FERRY   = 13;  // Atlantic Basin ferry terminal
const BIKE_TO_FERRY   = 4;

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────

function nowMins() {
  if (SIM_TIME) return parseMins(SIM_TIME);
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function parseMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function addMins(t, delta) {
  const total = parseMins(t) + delta;
  return `${String(Math.floor(total / 60) % 24).padStart(2,'0')}:${String(total % 60).padStart(2,'0')}`;
}

function fmt12(t) {
  const [h, m] = t.split(':').map(Number);
  return `${h % 12 || 12}:${String(m).padStart(2,'0')}\u202f${h >= 12 ? 'PM' : 'AM'}`;
}

function isWeekend() {
  if (SIM_WEEKEND !== null) return SIM_WEEKEND;
  const d = new Date().getDay();
  return d === 0 || d === 6;
}

function ferrySchedule() {
  return isWeekend() ? FERRY.weekend : FERRY.weekday;
}

function tomorrowSchedule() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  const day = d.getDay();
  const tmWeekend = day === 0 || day === 6;
  return { sch: tmWeekend ? FERRY.weekend : FERRY.weekday, isWeekend: tmWeekend };
}

function nowStr() {
  const nm = nowMins();
  return `${String(Math.floor(nm / 60)).padStart(2,'0')}:${String(nm % 60).padStart(2,'0')}`;
}

function numColor(n, good, warn) {
  if (n >= good) return 'c-green';
  if (n >= warn) return 'c-yellow';
  return 'c-red';
}

// ─────────────────────────────────────────────────────────────────────────────
// CLOCK
// ─────────────────────────────────────────────────────────────────────────────

function tickClock() {
  const n = new Date();
  const h = n.getHours() % 12 || 12;
  const m = String(n.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}`;
}
setInterval(tickClock, 1000);
tickClock();

// ─────────────────────────────────────────────────────────────────────────────
// BUS  (MTA BusTime SIRI API)
// ─────────────────────────────────────────────────────────────────────────────

async function fetchArrivals(route, stopId) {
  const lineRef = encodeURIComponent(`MTA NYCT_${route}`);
  const url = `https://bustime.mta.info/api/siri/stop-monitoring.json`
    + `?key=${MTA_KEY}&MonitoringRef=${stopId}&LineRef=${lineRef}&MaximumStopVisits=4`;
  const data = await fetch(url).then(r => r.json());
  const visits = data?.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit ?? [];
  return visits.map(v => {
    const call = v.MonitoredVehicleJourney?.MonitoredCall;
    const raw  = call?.ExpectedArrivalTime || call?.AimedArrivalTime;
    return raw ? Math.round((new Date(raw) - Date.now()) / 60000) : null;
  }).filter(m => m !== null && m >= -1).slice(0, 4);
}

function renderBusPanel(elId, items, walkMins) {
  const el = document.getElementById(elId);
  if (!items.length) {
    el.innerHTML = `<div class="bus-primary"><div class="loading">No service data</div></div>`;
    return;
  }

  const [first, ...rest] = items;
  const pillCls = first.route === 'B57' ? 'pill-b57' : 'pill-b61';
  const isNow   = first.mins <= 0;
  const bigCls  = isNow ? 'c-red' : first.mins <= 4 ? 'c-yellow' : 'c-green';

  const numHtml = isNow
    ? `<div class="primary-num primary-now c-red">Now</div>`
    : `<div class="primary-num ${bigCls}">${first.mins}<span class="primary-unit">min</span></div>`;

  const upcomingHtml = rest.length ? `
    <div class="upcoming-list">
      ${rest.slice(0, 3).map(({ route, mins }) => {
        const cls = route === 'B57' ? 'pill-b57 upcoming-pill' : 'pill-b61 upcoming-pill';
        const mc  = mins <= 0 ? 'c-red' : mins <= 4 ? 'c-yellow' : 'c-muted';
        const lbl = mins <= 0 ? 'Now' : mins;
        const unit = mins > 0 ? `<span class="upcoming-unit"> min</span>` : '';
        return `<div class="upcoming-row">
          <span class="${cls}">${route}</span>
          <span class="upcoming-mins ${mc}">${lbl}${unit}</span>
        </div>`;
      }).join('')}
    </div>` : '';

  const leaveInMins = first.mins - walkMins;
  let leaveByHtml;
  if (isNow || leaveInMins <= 0) {
    leaveByHtml = `<div class="leave-by"><span class="missed">Leave now!</span> (${walkMins} min walk)</div>`;
  } else {
    leaveByHtml = `<div class="leave-by">Leave by <b>${fmt12(addMins(nowStr(), leaveInMins))}</b> · ${walkMins} min walk</div>`;
  }

  el.innerHTML = `
    <div class="bus-primary">
      <div class="bus-pill ${pillCls}">${first.route}</div>
      ${numHtml}
    </div>
    ${upcomingHtml}
    ${leaveByHtml}`;
}

// Shared state for ticker
const busTickerState = { f: [], ac: [] };

async function loadFBus() {
  try {
    const [b57, b61] = await Promise.all([
      fetchArrivals('B57', 'MTA_901797'),
      fetchArrivals('B61', 'MTA_901797'),
    ]);
    const merged = [
      ...b57.map(m => ({ route: 'B57', mins: m })),
      ...b61.map(m => ({ route: 'B61', mins: m })),
    ].sort((a, b) => a.mins - b.mins).slice(0, 5);
    busTickerState.f = merged;
    renderBusPanel('f-panel', merged, WALK_TO_F_STOP);
  } catch (e) {
    document.getElementById('f-panel').innerHTML = `<div class="err">Bus data unavailable</div>`;
    console.error('F bus:', e);
  }
}

async function loadACBus() {
  try {
    const arrivals = await fetchArrivals('B61', 'MTA_305096');
    const items    = arrivals.map(m => ({ route: 'B61', mins: m }));
    busTickerState.ac = items;
    renderBusPanel('ac-panel', items, WALK_TO_AC_STOP);
  } catch (e) {
    document.getElementById('ac-panel').innerHTML = `<div class="err">Bus data unavailable</div>`;
    console.error('AC bus:', e);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CITIBIKE  (GBFS, no key required)
// ─────────────────────────────────────────────────────────────────────────────

const bikeState = { eBikes: 0, classic: 0, docks: 0 };

async function loadCitibike() {
  try {
    const [infoRes, statusRes] = await Promise.all([
      fetch('https://gbfs.citibikenyc.com/gbfs/en/station_information.json'),
      fetch('https://gbfs.citibikenyc.com/gbfs/en/station_status.json'),
    ]);
    const { data: { stations: info   } } = await infoRes.json();
    const { data: { stations: status } } = await statusRes.json();

    const statusMap = Object.fromEntries(status.map(s => [s.station_id, s]));
    const home      = info.find(s => s.name.toLowerCase().includes('dikeman'));
    if (!home) throw new Error('Station not found');

    const st = statusMap[home.station_id] ?? {};
    let eBikes = st.num_ebikes_available ?? 0;
    if (!eBikes && st.vehicle_types_available) {
      const ev = st.vehicle_types_available.find(v =>
        (v.vehicle_type_id ?? '').toLowerCase().includes('elec') ||
        (v.vehicle_type_id ?? '').toLowerCase().includes('ebike')
      );
      eBikes = ev?.count ?? 0;
    }
    const classic = Math.max(0, (st.num_bikes_available ?? 0) - eBikes);
    const docks   = st.num_docks_available ?? 0;
    Object.assign(bikeState, { eBikes, classic, docks });

    document.getElementById('bike-inline').innerHTML =
      `<span class="${numColor(eBikes, 2, 1)}"><b class="bike-val">${eBikes}</b> ⚡ E-Bike${eBikes !== 1 ? 's' : ''}</span>`
      + `&ensp;·&ensp;<span class="${numColor(classic, 4, 1)}"><b class="bike-val">${classic}</b> Classic</span>`
      + `&ensp;·&ensp;<span class="${numColor(docks, 4, 1)}"><b class="bike-val">${docks}</b> Open Dock${docks !== 1 ? 's' : ''}</span>`;
  } catch (e) {
    document.getElementById('bike-inline').innerHTML = `<span class="err">Unavailable</span>`;
    console.error('Citibike:', e);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// FERRY  (schedule-based, from ferry.nyc South Brooklyn Route)
// ─────────────────────────────────────────────────────────────────────────────

function loadFerry() {
  const sch      = ferrySchedule();
  const nm       = nowMins();
  const upcoming = sch.fromRH.filter(t => parseMins(t) >= nm - 1).slice(0, 3);
  const el       = document.getElementById('ferry-rows');

  // No more ferries today — show tomorrow's first departures
  if (!upcoming.length) {
    const { sch: tmSch, isWeekend: tmWknd } = tomorrowSchedule();
    const tmType  = tmWknd ? 'Weekend' : 'Weekday';
    const [tmFirst, ...tmRest] = tmSch.fromRH.slice(0, 3);
    const tmUpcomingRows = tmRest.map(t => `
      <div class="upcoming-row">
        <span class="ferry-time-small">${fmt12(t)}</span>
        <span class="upcoming-mins c-muted">Tomorrow</span>
      </div>`).join('');
    const tmLeaveBy = `<div class="leave-by">`
      + `Leave by <b>${fmt12(addMins(tmFirst, -WALK_TO_FERRY))}</b> walk · <b>${fmt12(addMins(tmFirst, -BIKE_TO_FERRY))}</b> bike<br>`
      + `Wall St <b>${fmt12(addMins(tmFirst, tmSch.rhToWallSt))}</b> · 34th <b>${fmt12(addMins(tmFirst, tmSch.rhTo34th))}</b>`
      + `</div>`;
    el.innerHTML = `
      <div class="bus-primary">
        <div class="bus-pill pill-ferry">Ferry</div>
        <div class="primary-num c-muted" style="font-size:52px;line-height:1">${fmt12(tmFirst)}</div>
        <div class="ferry-dep-label">Tomorrow · ${tmType}</div>
      </div>
      ${tmRest.length ? `<div class="upcoming-list">${tmUpcomingRows}</div>` : ''}
      ${tmLeaveBy}`;
    return;
  }

  // Weekend — before first boat
  if (isWeekend() && nm < parseMins(sch.fromRH[0])) {
    const first = sch.fromRH[0];
    el.innerHTML = `<div class="ferry-primary"><div class="loading" style="line-height:1.8">
      No early service on weekends.<br>
      First boat at <b style="color:var(--text)">${fmt12(first)}</b>.
    </div></div>`;
    return;
  }

  // Primary departure
  const [primary, ...rest] = upcoming;
  const depMins    = parseMins(primary);
  const diff       = depMins - nm;
  const missedWalk = nm > depMins - WALK_TO_FERRY;
  const missedBike = nm > depMins - BIKE_TO_FERRY;

  const isNow  = diff <= 0;
  const bigCls = isNow ? 'c-red' : diff <= 5 ? 'c-red' : diff <= 15 ? 'c-yellow' : 'c-green';

  const numHtml = isNow
    ? `<div class="primary-num primary-now c-red">Now</div>`
    : `<div class="primary-num ${bigCls}">${diff}<span class="primary-unit">min</span></div>`;

  const upcomingRows = rest.map(t => {
    const d  = parseMins(t) - nm;
    const dc = d <= 5 ? 'c-red' : d <= 15 ? 'c-yellow' : 'c-muted';
    return `<div class="upcoming-row">
      <span class="ferry-time-small">${fmt12(t)}</span>
      <span class="upcoming-mins ${dc}">${d}<span class="upcoming-unit"> min</span></span>
    </div>`;
  }).join('');

  let leaveByHtml;
  if (missedBike) {
    leaveByHtml = `<div class="leave-by"><span class="missed">Too late to catch this one</span></div>`;
  } else if (missedWalk) {
    leaveByHtml = `<div class="leave-by"><span class="missed">Bike now</span> · walk window closed</div>`;
  } else {
    leaveByHtml = `<div class="leave-by">`
      + `Leave by <b>${fmt12(addMins(primary, -WALK_TO_FERRY))}</b> walk · <b>${fmt12(addMins(primary, -BIKE_TO_FERRY))}</b> bike<br>`
      + `Wall St <b>${fmt12(addMins(primary, sch.rhToWallSt))}</b> · 34th <b>${fmt12(addMins(primary, sch.rhTo34th))}</b>`
      + `</div>`;
  }

  el.innerHTML = `
    <div class="bus-primary">
      <div class="bus-pill pill-ferry">Ferry</div>
      ${numHtml}
      <div class="ferry-dep-label">${fmt12(primary)}</div>
    </div>
    ${rest.length ? `<div class="upcoming-list">${upcomingRows}</div>` : ''}
    ${leaveByHtml}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// TICKER
// ─────────────────────────────────────────────────────────────────────────────

function buildTicker() {
  const nm  = nowMins();
  const sch = ferrySchedule();
  const items = [];

  if (busTickerState.f.length) {
    const times = busTickerState.f.slice(0, 3)
      .map(({ route, mins }) => `${route} ${mins <= 0 ? 'now' : mins + ' min'}`).join(' · ');
    items.push(`<b>F Train</b>: ${times}`);
  }

  if (busTickerState.ac.length) {
    const times = busTickerState.ac.slice(0, 3)
      .map(({ route, mins }) => `${route} ${mins <= 0 ? 'now' : mins + ' min'}`).join(' · ');
    items.push(`<b>A/C Train</b>: ${times}`);
  }

  const later = sch.fromRH.filter(t => parseMins(t) >= nm - 1).slice(3, 6);
  if (later.length) items.push(`Later ferries: ${later.map(fmt12).join(' · ')}`);

  items.push(
    `Citibike: <b>${bikeState.eBikes}</b> e-bike${bikeState.eBikes !== 1 ? 's' : ''}`
    + ` · <b>${bikeState.classic}</b> classic`
    + ` · <b>${bikeState.docks}</b> open dock${bikeState.docks !== 1 ? 's' : ''}`
  );

  if (isWeekend()) items.push('Weekend schedule · No early ferry service');

  const sep    = `<span class="ticker-sep">  ·  ·  ·  </span>`;
  const single = items.map(i => `<span class="ticker-item">${i}</span>${sep}`).join('');
  const track  = document.getElementById('ticker');
  track.innerHTML = single + single;

  requestAnimationFrame(() => {
    const singleWidth = track.scrollWidth / 2;
    const duration    = Math.max(20, singleWidth / 80);
    track.style.cssText = `animation: ticker-scroll ${duration}s linear infinite;`;
  });
}

const tickerStyle = document.createElement('style');
tickerStyle.textContent = `
  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }`;
document.head.appendChild(tickerStyle);

// ─────────────────────────────────────────────────────────────────────────────
// WEATHER  (Open-Meteo, no key required)
// ─────────────────────────────────────────────────────────────────────────────

async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast`
      + `?latitude=${HOME_LAT}&longitude=${HOME_LON}`
      + `&current=temperature_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m`
      + `&hourly=precipitation_probability`
      + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max`
      + `&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch`
      + `&forecast_days=1&timezone=America%2FNew_York`;
    const data = await fetch(url).then(r => r.json());
    const c = data.current;

    const temp     = Math.round(c.temperature_2m);
    const feels    = Math.round(c.apparent_temperature);
    const code     = c.weather_code;
    const wind     = Math.round(c.wind_speed_10m);
    const rainPct  = data.daily.precipitation_probability_max?.[0] ?? 0;

    document.getElementById('wx-temp').textContent = `${temp}°`;
    document.getElementById('wx-detail').innerHTML =
      `Feels ${feels}°<br>${wxDesc(code)} · ${wind} mph`;
    document.getElementById('wx-rain-pct').textContent = `${rainPct}%`;
    document.getElementById('wx-sentence').textContent =
      buildDaySentence(c, data.daily, data.hourly);
  } catch (e) {
    document.getElementById('wx-sentence').textContent = 'Weather unavailable';
    console.error('Weather:', e);
  }
}

function buildDaySentence(current, daily, hourly) {
  const high    = Math.round(daily.temperature_2m_max[0]);
  const low     = Math.round(daily.temperature_2m_min[0]);
  const maxWind = Math.round(daily.wind_speed_10m_max[0]);
  const nowHour = new Date().getHours();

  const precipByHour = {};
  (hourly.time || []).forEach((t, i) => {
    const h = parseInt(t.split('T')[1], 10);
    if (h >= nowHour) precipByHour[h] = hourly.precipitation_probability[i];
  });

  const THRESH  = 45;
  const hasRain = (start, end) =>
    Array.from({ length: end - start }, (_, i) => start + i)
      .some(h => (precipByHour[h] ?? 0) >= THRESH);

  const morningRain   = hasRain(6,  12);
  const afternoonRain = hasRain(12, 17);
  const eveningRain   = hasRain(17, 22);
  const raining       = current.weather_code >= 51;
  const parts         = [];

  parts.push(`High ${high}°, low ${low}°.`);

  const periods = [morningRain && 'morning', afternoonRain && 'afternoon', eveningRain && 'evening'].filter(Boolean);
  if (raining && periods.length) {
    parts.push('Rainy all day — pack an umbrella.');
  } else if (raining) {
    parts.push('Raining now, expected to clear.');
  } else if (periods.length === 3) {
    parts.push('Rain throughout the day — umbrella recommended.');
  } else if (periods.length) {
    const when = periods.length === 2 ? `${periods[0]} and ${periods[1]}` : periods[0];
    parts.push(`Rain expected this ${when} — pack an umbrella.`);
  }

  if (low <= 28)            parts.push('Freezing temps tonight.');
  else if (high <= 35)      parts.push('Stays cold all day — bundle up.');

  if (maxWind >= 25)        parts.push(`Very windy, up to ${maxWind} mph.`);
  else if (maxWind >= 18)   parts.push(`Breezy, up to ${maxWind} mph.`);

  if (!raining && !periods.length && maxWind < 18) {
    if (high >= 68)              parts.push('Lovely day out there.');
    else if (high >= 55 && low >= 45) parts.push('Decent day, no complaints.');
  }

  return parts.join(' ');
}

function wxDesc(c) {
  if (c === 0)  return 'Clear';
  if (c <= 2)   return 'Partly cloudy';
  if (c <= 3)   return 'Overcast';
  if (c <= 48)  return 'Foggy';
  if (c <= 55)  return 'Drizzle';
  if (c <= 67)  return 'Rain';
  if (c <= 77)  return 'Snow';
  if (c <= 82)  return 'Showers';
  return 'Thunderstorm';
}

// ─────────────────────────────────────────────────────────────────────────────
// REFRESH LOOP
// ─────────────────────────────────────────────────────────────────────────────

let timer = null;

async function refresh() {
  clearTimeout(timer);
  try {
    await Promise.all([loadFBus(), loadACBus(), loadCitibike(), loadWeather()]);
  } catch (e) {
    console.error('Refresh error:', e);
  }
  loadFerry();
  buildTicker();

  const t = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  document.getElementById('status-text').textContent = `Updated ${t}`;

  timer = setTimeout(() => { if (!document.hidden) refresh(); }, 30_000);
}

setInterval(() => { loadFerry(); buildTicker(); }, 60_000);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) refresh();
});

refresh();
</script>
